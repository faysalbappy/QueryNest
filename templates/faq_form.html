{% extends "base.html" %}
{% block title %}{{ action }} FAQ{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="page-header">
      <h3 class="fw-bold mb-1">
        <i class="bi bi-{{ 'plus-circle' if action=='Add' else 'pencil' }}-fill me-2"></i>{{ action }} FAQ
      </h3>
    </div>

    <div class="card">
      <div class="card-body p-4">
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Question</label>
            <input type="text" name="question" class="form-control"
                   value="{{ faq.question if faq else '' }}"
                   placeholder="e.g. What is the passing mark?" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Answer</label>
            <textarea name="answer" class="form-control" rows="6"
                      placeholder="Write a clear, helpful answer…" required>{{ faq.answer if faq else '' }}</textarea>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Keywords <small class="text-muted fw-normal">(space-separated, used for matching)</small></label>
            <input type="text" name="keywords" class="form-control"
                   value="{{ faq.keywords if faq else '' }}"
                   placeholder="e.g. grade pass mark minimum fail">
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Category</label>
            <select name="category" class="form-select" required>
              {% for cat in ['Academic','Exam','Lab','General'] %}
              <option value="{{ cat }}" {% if faq and faq.category == cat %}selected{% endif %}>{{ cat }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="d-flex gap-3">
            <button type="submit" class="btn btn-{% if action=='Add' %}warning{% else %}primary{% endif %} fw-semibold px-4">
              <i class="bi bi-check-lg me-2"></i>{{ action }} FAQ
            </button>
            <a href="{{ url_for('admin_faqs') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
