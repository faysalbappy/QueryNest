{% extends "base.html" %}
{% block title %}{{ action }} Notice{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card">
      <div class="card-header py-3" style="background:#1a3c6e; color:#fff;">
        <h5 class="mb-0 fw-bold">
          <i class="bi bi-megaphone me-2"></i>{{ action }} Notice
        </h5>
      </div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
            <input type="text" name="title" class="form-control"
                   value="{{ notice.title if notice else '' }}"
                   placeholder="e.g. Mid-term Exam Schedule Released" required/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Description <span class="text-danger">*</span></label>
            <textarea name="description" class="form-control" rows="4"
                      placeholder="Enter the full notice details…" required>{{ notice.description if notice else '' }}</textarea>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Publish Date <span class="text-danger">*</span></label>
            <input type="date" name="publish_date" class="form-control"
                   value="{{ notice.publish_date if notice else '' }}" required/>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4 fw-semibold">
              <i class="bi bi-check-lg me-1"></i>{{ action }} Notice
            </button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary px-4">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
