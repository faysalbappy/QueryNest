{% extends "base.html" %}
{% block title %}Upload Study Material{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="page-header">
      <h3 class="fw-bold mb-1"><i class="bi bi-cloud-upload-fill me-2"></i>Upload Study Material</h3>
      <p class="mb-0 opacity-75">Add notes, guides, or templates for students to download</p>
    </div>

    <div class="card">
      <div class="card-body p-4">
        <form method="post" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label fw-semibold">Title</label>
            <input type="text" name="title" class="form-control" placeholder="e.g. Data Structures Lecture Notes" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Description <small class="text-muted fw-normal">(optional)</small></label>
            <textarea name="description" class="form-control" rows="3"
                      placeholder="Brief description of the material…"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Category</label>
            <select name="category" class="form-select" required>
              <option value="">Select category</option>
              <option value="Lecture Notes">Lecture Notes</option>
              <option value="Lab Guide">Lab Guide</option>
              <option value="Past Papers">Past Papers</option>
              <option value="Templates">Templates</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">File</label>
            <input type="file" name="file" class="form-control"
                   accept=".pdf,.docx,.pptx,.xlsx,.png,.jpg,.jpeg,.zip,.txt" required>
            <div class="form-text">Allowed: PDF, DOCX, PPTX, XLSX, PNG, JPG, ZIP, TXT</div>
          </div>
          <div class="d-flex gap-3">
            <button type="submit" class="btn btn-primary px-4">
              <i class="bi bi-upload me-2"></i>Upload
            </button>
            <a href="{{ url_for('admin_materials') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
